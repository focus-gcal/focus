services:
  db:
    image: pgvector/pgvector:pg16
    container_name: db
    restart: unless-stopped
    env_file:
      - ./env/.env
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 20s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    env_file:
      - ./env/.env
    ports:
      - "${REDIS_PORT:-6379}:6379"

  backend:
    build:
      context: ./backend
    container_name: backend
    restart: unless-stopped
    env_file:
      - ./env/.env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"

  celery_worker:
    build:
      context: ./backend
    container_name: celery_worker
    restart: unless-stopped
    env_file:
      - ./env/.env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A focus_gcal worker -l info

  # celery_beat:
  #   build:
  #     context: ./backend
  #   container_name: celery_beat
  #   restart: unless-stopped
  #   env_file:
  #     - ./env/.env
  #   volumes:
  #     - ./backend:/app
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     redis:
  #       condition: service_started
  #   command: celery -A focus_gcal beat -l info

volumes:
  pgdata:
